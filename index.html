<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AENAON · GFE Workbench</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Cinzel:wght@400;500;600&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --black: #080808;
  --deep: #0e0d0b;
  --surface: #141210;
  --surface2: #1a1815;
  --surface3: #221f1b;
  --border: rgba(180,140,50,0.15);
  --border2: rgba(180,140,50,0.08);
  --gold: #c9a84c;
  --gold-bright: #e8c870;
  --gold-dim: #7a6228;
  --gold-pale: rgba(201,168,76,0.08);
  --gold-glow: rgba(201,168,76,0.12);
  --text: #d4cfc4;
  --text2: #8a8278;
  --text3: #4a4640;
  --al: #4a8a5a;
  --al-pale: rgba(74,138,90,0.12);
  --mis: #c07040;
  --mis-pale: rgba(192,112,64,0.12);
  --dst: #a03030;
  --dst-pale: rgba(160,48,48,0.12);
  --teal: #3a7a7a;
  --teal-pale: rgba(58,122,122,0.12);
  --violet: #6a4a9a;
  --violet-pale: rgba(106,74,154,0.12);
  --radius: 2px;
  --font-display: 'Cinzel', serif;
  --font-body: 'Cormorant Garamond', Georgia, serif;
  --font-mono: 'DM Mono', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 16px; }

body {
  font-family: var(--font-body);
  background: var(--black);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Subtle noise texture overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 1000;
  opacity: 0.4;
}

/* ── AENAON SVG WATERMARK ── */
.aenaon-mark {
  position: fixed;
  bottom: 24px;
  right: 28px;
  opacity: 0.12;
  pointer-events: none;
  z-index: 999;
  transition: opacity 0.3s;
}
.aenaon-mark:hover { opacity: 0.25; }

/* ── LAYOUT ── */
.app {
  display: grid;
  grid-template-columns: 340px 1fr;
  grid-template-rows: 56px 1fr;
  min-height: 100vh;
  position: relative;
}

/* ── HEADER ── */
.header {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  padding: 0 28px;
  border-bottom: 1px solid var(--border);
  background: var(--deep);
  position: relative;
  z-index: 10;
}
.header-title {
  font-family: var(--font-display);
  font-size: 11px;
  letter-spacing: 0.35em;
  color: var(--gold);
  text-transform: uppercase;
}
.header-subtitle {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.2em;
  color: var(--text3);
  margin-left: 20px;
}
.header-status {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 16px;
}
.status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--text3);
}
.status-dot.active { background: var(--al); box-shadow: 0 0 6px var(--al); }
.status-label {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.15em;
  color: var(--text3);
  text-transform: uppercase;
}

/* ── LEFT PANEL ── */
.panel-left {
  border-right: 1px solid var(--border);
  background: var(--deep);
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* ── RIGHT PANEL ── */
.panel-right {
  background: var(--black);
  overflow-y: auto;
  padding: 24px 28px;
  position: relative;
}

/* ── SECTION LABELS ── */
.sec-label {
  font-family: var(--font-mono);
  font-size: 8px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--text3);
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border2);
  margin-bottom: 10px;
}

/* ── UPLOAD ZONE ── */
.upload-zone {
  border: 1px dashed var(--border);
  border-radius: var(--radius);
  padding: 20px 16px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  background: var(--surface);
}
.upload-zone:hover, .upload-zone.drag-over {
  border-color: var(--gold-dim);
  background: var(--gold-pale);
}
.upload-zone input[type=file] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%;
}
.upload-icon {
  font-size: 22px;
  color: var(--gold-dim);
  margin-bottom: 6px;
  display: block;
}
.upload-zone p {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.5;
}
.upload-zone strong { color: var(--text); }

.paste-input {
  width: 100%;
  min-height: 60px;
  padding: 10px 12px;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text2);
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  resize: vertical;
  outline: none;
  line-height: 1.5;
  margin-top: 8px;
}
.paste-input:focus { border-color: var(--gold-dim); }
.paste-input::placeholder { color: var(--text3); }

.btn-row { display: flex; gap: 6px; margin-top: 8px; }

.btn {
  padding: 6px 14px;
  font-family: var(--font-display);
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  border: 1px solid var(--gold-dim);
  background: transparent;
  color: var(--gold);
  cursor: pointer;
  border-radius: var(--radius);
  transition: all 0.15s;
  white-space: nowrap;
}
.btn:hover { background: var(--gold-pale); border-color: var(--gold); }
.btn-ghost {
  border-color: var(--border);
  color: var(--text3);
}
.btn-ghost:hover { border-color: var(--border); color: var(--text2); background: var(--surface2); }

/* ── SESSION LIST ── */
.session-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.session-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  cursor: pointer;
  transition: all 0.15s;
  font-size: 12px;
}
.session-item:hover { border-color: var(--border); }
.session-item.active { border-color: var(--gold-dim); background: var(--gold-pale); }
.session-name { flex: 1; color: var(--text); font-family: var(--font-body); font-size: 13px; }
.session-badge {
  font-family: var(--font-mono);
  font-size: 7px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 1px 5px;
  border-radius: 1px;
}
.badge-new { background: var(--surface3); color: var(--text3); }
.badge-continuation { background: var(--teal-pale); color: var(--teal); border: 1px solid rgba(58,122,122,0.3); }
.badge-expansion { background: var(--gold-pale); color: var(--gold-dim); border: 1px solid rgba(201,168,76,0.2); }
.badge-parallel { background: var(--violet-pale); color: var(--violet); border: 1px solid rgba(106,74,154,0.3); }
.session-remove {
  color: var(--text3);
  cursor: pointer;
  font-size: 14px;
  line-height: 1;
  padding: 0 2px;
  opacity: 0.5;
}
.session-remove:hover { opacity: 1; color: var(--dst); }

/* ── ENVELOPE ── */
.envelope-card {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 14px 16px;
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 14px;
  align-items: center;
}
.env-score {
  font-family: var(--font-display);
  font-size: 40px;
  font-weight: 400;
  line-height: 1;
  min-width: 64px;
  text-align: center;
}
.env-score.ok { color: var(--al); }
.env-score.strained { color: var(--gold); }
.env-score.critical { color: var(--mis); }
.env-score.collapsed { color: var(--dst); }
.env-status {
  font-family: var(--font-mono);
  font-size: 8px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.env-components {
  display: flex;
  gap: 14px;
}
.env-comp { text-align: center; }
.env-comp-val {
  font-family: var(--font-mono);
  font-size: 16px;
  font-weight: 500;
}
.env-comp-label {
  display: block;
  font-family: var(--font-mono);
  font-size: 8px;
  letter-spacing: 0.1em;
  color: var(--text3);
  text-transform: uppercase;
  margin-top: 1px;
}

/* ── CONSTELLATION ── */
.constellation-wrap {
  position: relative;
}
.breadcrumb {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: var(--text3);
  margin-bottom: 6px;
  min-height: 16px;
}
.bc-item {
  color: var(--gold-dim);
  cursor: pointer;
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.1em;
}
.bc-item:hover { color: var(--gold); }
.bc-sep { color: var(--text3); font-size: 9px; }

#constellation-canvas {
  width: 100%;
  height: 200px;
  display: block;
  border: 1px solid var(--border2);
  background: var(--surface);
  border-radius: var(--radius);
  cursor: pointer;
}

.const-legend {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 6px;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 4px;
  font-family: var(--font-mono);
  font-size: 8px;
  letter-spacing: 0.08em;
  color: var(--text3);
}
.legend-pip {
  width: 8px; height: 8px;
  border-radius: 50%;
  border: 1.5px solid currentColor;
  flex-shrink: 0;
}

/* ── TIMELINE ── */
.timeline-wrap { }
.timeline-track {
  position: relative;
  height: 24px;
  display: flex;
  align-items: center;
  margin-bottom: 4px;
}
.timeline-line {
  position: absolute;
  left: 0; right: 0; top: 50%;
  height: 1px;
  background: var(--border2);
}
.timeline-stops {
  position: relative;
  display: flex;
  justify-content: space-between;
  width: 100%;
}
.tl-stop {
  position: relative;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.tl-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--surface3);
  border: 1.5px solid var(--text3);
  transition: all 0.2s;
  z-index: 1;
}
.tl-stop.active .tl-dot { background: var(--gold); border-color: var(--gold); transform: scale(1.3); }
.tl-stop:hover .tl-dot { border-color: var(--gold-dim); }
.tl-stop.boundary .tl-dot { border-color: var(--mis); background: var(--dst-pale); }
.tl-label {
  position: absolute;
  top: 12px;
  font-family: var(--font-mono);
  font-size: 7px;
  color: var(--text3);
  white-space: nowrap;
  transform: translateX(-50%);
  left: 50%;
  max-width: 60px;
  overflow: hidden;
  text-overflow: ellipsis;
}
.tl-stop.active .tl-label { color: var(--gold-dim); }
.timeline-slider {
  width: 100%;
  accent-color: var(--gold);
  height: 2px;
  margin-top: 18px;
  cursor: pointer;
}

/* ── PARTICIPANT STRIPS ── */
.strip {
  padding: 8px 10px;
  border: 1px solid var(--border2);
  background: var(--surface);
  border-radius: var(--radius);
  cursor: pointer;
  transition: all 0.15s;
  margin-bottom: 4px;
}
.strip:hover { border-color: var(--border); }
.strip.focused { border-color: var(--gold-dim); background: var(--gold-pale); }
.strip-header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 6px;
}
.strip-name {
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
}
.strip-locus {
  font-family: var(--font-mono);
  font-size: 8px;
  letter-spacing: 0.12em;
  color: var(--text3);
  text-transform: uppercase;
}
.mini-dims {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 3px;
}
.mini-dim-label {
  font-family: var(--font-mono);
  font-size: 7px;
  color: var(--text3);
  text-align: center;
  margin-bottom: 2px;
  letter-spacing: 0.05em;
}
.mini-bar {
  height: 4px;
  background: var(--surface3);
  border-radius: 1px;
  overflow: hidden;
  display: flex;
}
.mini-al { background: var(--al); }
.mini-mis { background: var(--mis); }

/* ── RIGHT PAGE ── */
.right-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 70vh;
  text-align: center;
  opacity: 0.35;
}
.right-empty-glyph {
  font-family: var(--font-display);
  font-size: 56px;
  color: var(--gold-dim);
  margin-bottom: 16px;
  line-height: 1;
}
.right-empty p {
  font-size: 15px;
  font-style: italic;
  color: var(--text2);
  line-height: 1.7;
  max-width: 300px;
}

/* ── READING HEADER ── */
.reading-header {
  border-bottom: 1px solid var(--border);
  padding-bottom: 16px;
  margin-bottom: 20px;
}
.reading-name {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 400;
  letter-spacing: 0.05em;
  color: var(--text);
  margin-bottom: 3px;
}
.reading-meta {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.2em;
  color: var(--text3);
  text-transform: uppercase;
}

/* ── TABS ── */
.tabs {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--border2);
  margin-bottom: 20px;
}
.tab {
  padding: 6px 16px;
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text3);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: all 0.15s;
}
.tab:hover { color: var(--text2); }
.tab.active { color: var(--gold); border-bottom-color: var(--gold); }

/* ── ZONE BLOCKS ── */
.zone-block { margin-bottom: 20px; }
.zone-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}
.zone-pip { width: 6px; height: 6px; border-radius: 50%; }
.zone-label {
  font-family: var(--font-mono);
  font-size: 8px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
}
.zone-rule { flex: 1; height: 1px; background: var(--border2); }

/* ── DIM CARD ── */
.dim-card {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 12px 14px;
  margin-bottom: 6px;
  transition: border-color 0.15s;
}
.dim-card:hover { border-color: var(--border); }
.dim-head {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-bottom: 8px;
}
.dim-name {
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  letter-spacing: 0.05em;
}
.dim-gloss {
  font-size: 12px;
  font-style: italic;
  color: var(--text2);
}
.dim-vals {
  display: flex;
  gap: 14px;
  margin-bottom: 8px;
  flex-wrap: wrap;
}
.dim-val { text-align: center; }
.dim-val-num {
  font-family: var(--font-mono);
  font-size: 20px;
  font-weight: 400;
  line-height: 1;
}
.dim-val-label {
  display: block;
  font-family: var(--font-mono);
  font-size: 7px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text3);
  margin-top: 2px;
}
.val-A { color: var(--text); }
.val-L { color: var(--al); }
.val-M { color: var(--mis); }
.val-N { color: var(--text3); }

/* Axis bar */
.axis-bar {
  height: 8px;
  background: var(--surface3);
  border-radius: 1px;
  overflow: hidden;
  display: flex;
  margin-bottom: 6px;
}
.bar-al { background: var(--al); transition: width 0.4s ease; }
.bar-mis { background: var(--mis); transition: width 0.4s ease; }
.bar-neutral { background: var(--surface3); }
.bar-lost { background: rgba(255,255,255,0.04); }

/* Emission row */
.emission-row {
  display: flex;
  align-items: center;
  gap: 6px;
  padding-top: 6px;
  border-top: 1px solid var(--border2);
  font-size: 11px;
}
.e-label {
  font-family: var(--font-mono);
  font-size: 7px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text3);
}
.e-family {
  font-family: var(--font-mono);
  font-size: 8px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  padding: 1px 5px;
  border-radius: 1px;
}
.ef-Al { background: var(--al-pale); color: var(--al); }
.ef-Mis { background: var(--mis-pale); color: var(--mis); }
.ef-Dst { background: var(--dst-pale); color: var(--dst); }
.e-note { color: var(--text2); font-size: 11px; font-style: italic; flex: 1; }
.prov-badge {
  font-family: var(--font-mono);
  font-size: 7px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--violet);
  background: var(--violet-pale);
  padding: 1px 4px;
  border-radius: 1px;
}

/* ── DUAL REGISTER ── */
.dual-reg {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 12px 14px;
  margin-bottom: 16px;
}
.dr-col-label {
  font-family: var(--font-mono);
  font-size: 8px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 8px;
}
.dr-col-label.ext { color: var(--mis); }
.dr-row {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 4px;
  font-size: 11px;
}
.dr-dim {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--text3);
  width: 24px;
}
.dr-bar {
  flex: 1;
  height: 4px;
  background: var(--surface3);
  border-radius: 1px;
  overflow: hidden;
  display: flex;
}
.dr-mismatch {
  grid-column: 1 / -1;
  font-style: italic;
  font-size: 11px;
  color: var(--dst);
  border-top: 1px solid var(--dst-pale);
  padding-top: 8px;
  margin-top: 4px;
}

/* ── MATRIX EVENTS ── */
.event-row {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 7px 0;
  border-bottom: 1px solid var(--border2);
  font-size: 12px;
  line-height: 1.5;
}
.event-row:last-child { border-bottom: none; }
.ev-flow {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--text3);
  white-space: nowrap;
  min-width: 80px;
  padding-top: 1px;
}
.ev-dir {
  font-family: var(--font-mono);
  font-size: 8px;
  padding: 1px 5px;
  border-radius: 1px;
  white-space: nowrap;
  min-width: 48px;
  text-align: center;
}
.dir-acute { background: rgba(201,168,76,0.1); color: var(--gold-dim); }
.dir-accum { background: var(--teal-pale); color: var(--teal); }
.dir-lateral { background: var(--surface3); color: var(--text3); }
.dir-bypass { background: var(--violet-pale); color: var(--violet); }
.ev-desc { flex: 1; color: var(--text2); }
.ev-mag {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--text3);
  white-space: nowrap;
}

/* ── ANALYSIS ── */
.analysis-card {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-left: 2px solid var(--gold-dim);
  border-radius: 0 var(--radius) var(--radius) 0;
  padding: 14px 16px;
  margin-bottom: 16px;
}
.a-row {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  margin-bottom: 7px;
  font-size: 13px;
  line-height: 1.5;
}
.a-key {
  font-family: var(--font-mono);
  font-size: 8px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text3);
  min-width: 72px;
  padding-top: 2px;
  flex-shrink: 0;
}
.a-val { color: var(--text2); }
.inv-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-top: 3px;
}
.inv-chip {
  font-family: var(--font-mono);
  font-size: 8px;
  padding: 1px 5px;
  border-radius: 1px;
  border: 1px solid var(--border2);
  color: var(--text3);
}
.inv-chip.held { color: var(--al); border-color: rgba(74,138,90,0.3); background: var(--al-pale); }
.inv-chip.failed { color: var(--dst); border-color: rgba(160,48,48,0.3); background: var(--dst-pale); }
.key-finding {
  font-style: italic;
  font-size: 14px;
  line-height: 1.7;
  color: var(--text);
  border-top: 1px solid var(--border2);
  padding-top: 10px;
  margin-top: 8px;
}

/* Emission note */
.emission-note {
  font-style: italic;
  font-size: 13px;
  line-height: 1.7;
  color: var(--text2);
  padding: 10px 14px;
  border-left: 2px solid var(--gold-dim);
  background: var(--gold-pale);
  border-radius: 0 var(--radius) var(--radius) 0;
  margin-bottom: 14px;
}
.en-label {
  font-family: var(--font-mono);
  font-size: 7px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gold-dim);
  display: block;
  margin-bottom: 4px;
}

/* Taper note */
.taper-note {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.05em;
  color: var(--text3);
  font-style: italic;
  margin-bottom: 10px;
  padding: 6px 10px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
}

/* Sub-constellation prompt */
.sub-prompt {
  margin-top: 14px;
  padding: 10px 12px;
  border: 1px dashed rgba(58,122,122,0.3);
  border-radius: var(--radius);
  font-size: 12px;
  color: var(--teal);
  display: flex;
  align-items: center;
  gap: 8px;
}
.sub-btn {
  font-family: var(--font-mono);
  font-size: 8px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  border: 1px solid rgba(58,122,122,0.4);
  border-radius: 1px;
  padding: 2px 7px;
  color: var(--teal);
  cursor: pointer;
  background: transparent;
  margin-left: auto;
}
.sub-btn:hover { background: var(--teal-pale); }

/* ── COLLAPSIBLE ── */
.collapsible-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  user-select: none;
}
.collapsible-arr {
  font-size: 8px;
  color: var(--text3);
  transition: transform 0.2s;
}
.collapsible-arr.open { transform: rotate(90deg); }
.collapsible-body.closed { display: none; }

/* ── STATUS BAR ── */
.msg-bar {
  padding: 7px 12px;
  border-radius: var(--radius);
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.05em;
  margin-bottom: 10px;
}
.msg-error { background: var(--dst-pale); border: 1px solid rgba(160,48,48,0.3); color: var(--dst); }
.msg-info { background: var(--teal-pale); border: 1px solid rgba(58,122,122,0.3); color: var(--teal); }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--deep); }
::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: var(--gold-dim); }

/* ── RESPONSIVE ── */
@media (max-width: 800px) {
  .app { grid-template-columns: 1fr; grid-template-rows: 56px auto 1fr; }
  .panel-left { max-height: 50vh; }
}

</style>
</head>

<script>
// ══════════════════════════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════════════════════════
const DIMS = ['Cfg','Emb','Org','Dir','Leg'];
const GLOSSES = { Cfg:'admissibility', Emb:'support', Org:'coherence', Dir:'orientation', Leg:'inferability' };
const ZONES = {
  foundation: { dims:['Cfg','Emb'], color:'var(--gold)', pip:'#c9a84c', label:'Foundation' },
  bridge:     { dims:['Org'],       color:'var(--teal)', pip:'#3a7a7a', label:'Bridge' },
  articulation:{ dims:['Dir','Leg'], color:'var(--violet)', pip:'#6a4a9a', label:'Articulation' }
};
const DIM_ZONE = { Cfg:'foundation', Emb:'foundation', Org:'bridge', Dir:'articulation', Leg:'articulation' };

// Matrix reactivity — influence map [source][target] = factor
// Based on the full bilateral matrix: acute flows Fnd→Brg→Art, accumulated Art→Brg→Fnd
const MATRIX = {
  Cfg: { Emb:0.6, Org:0.7, Dir:0.4, Leg:0.5 },
  Emb: { Cfg:0.6, Org:0.7, Dir:0.3, Leg:0.45 },
  Org: { Cfg:0.4, Emb:0.4, Dir:0.6, Leg:0.6 },
  Dir: { Org:0.35, Cfg:0.2, Emb:0.15, Leg:0.3 },
  Leg: { Cfg:0.55, Emb:0.4, Org:0.45, Dir:0.3 }
};

// ══════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════
let sessions = [];
let currentIdx = 0;
let currentT = 0;
let focusedPid = null;
let zoomStack = [];
let rightTab = 'dimensions';
let cNodes = [];

// ══════════════════════════════════════════════════════════
// LOADING & SESSION MANAGEMENT
// ══════════════════════════════════════════════════════════
function loadFromPaste() {
  const raw = document.getElementById('paste-area').value.trim();
  if (!raw) { showMsg('Nothing to load.', 'error'); return; }
  // Try to extract base64 from URL
  let json = raw;
  try {
    const urlMatch = raw.match(/[?&]case=([^&\s]+)/);
    if (urlMatch) {
      json = decodeURIComponent(atob(urlMatch[1]));
    } else {
      // Try raw base64
      const cleaned = raw.replace(/^```[a-z]*\n?/,'').replace(/\n?```$/,'').trim();
      try { json = decodeURIComponent(atob(cleaned)); } catch(e) { json = cleaned; }
    }
  } catch(e) { json = raw; }
  try {
    const data = JSON.parse(json);
    ingestCase(data);
    document.getElementById('paste-area').value = '';
  } catch(e) {
    showMsg('Could not parse: ' + e.message, 'error');
  }
}

document.getElementById('file-input').addEventListener('change', function(e) {
  Array.from(e.target.files).forEach(readFile);
  this.value = '';
});

const dz = document.getElementById('drop-zone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('drag-over');
  Array.from(e.dataTransfer.files).forEach(readFile);
});

function readFile(f) {
  const r = new FileReader();
  r.onload = ev => {
    try { ingestCase(JSON.parse(ev.target.result)); }
    catch(e) { showMsg('Could not parse ' + f.name, 'error'); }
  };
  r.readAsText(f);
}

function ingestCase(data) {
  // Normalize v2 schema to v3
  data = normalizeSchema(data);
  const type = detectType(data);
  if (type === 'continuation' || type === 'expansion') {
    mergeSession(data, type);
  } else {
    data._type = type;
    data._id = Date.now();
    sessions.push(data);
    currentIdx = sessions.length - 1;
    currentT = 0;
    focusedPid = null;
    zoomStack = [];
  }
  saveToStorage();
  renderAll();
  showMsg('Case loaded: ' + (data.system_name || data.case_id || 'unnamed'), 'info');
}

function normalizeSchema(data) {
  // Convert v2 format to v3 format
  if (data.schema_version === '2.0' || data.system) {
    const out = {
      case_id: data.system?.name || 'case',
      system_name: data.system?.name || 'Unnamed',
      locus_of_analysis: data.system?.locus || 'local',
      description: data.system?.summary || '',
      participants: (data.participants || []).map(p => ({
        id: p.id, name: p.name, locus: 'local', description: p.role || ''
      })),
      timeline: (data.timeline || []).map((t, i) => ({
        timestep_label: t.label || ('T' + i),
        narrative_note: t.notes || '',
        emission_notes: t.emission_notes && Object.values(t.emission_notes)[0] || '',
        participants: Object.fromEntries(
          Object.entries(t.states || {}).map(([pid, dims]) => [pid, { dimensions: dims }])
        )
      })),
      matrix_events: (data.matrix_events || []).map(me => ({
        timestep_idx: me.t || 0,
        source_participant: me.from_participant || me.participant || null,
        target_participant: me.to_participant || null,
        source: me.from_dim || '',
        target: me.to_dim || '',
        direction: me.direction === 'accum_up' ? 'accumulated_up' :
                   me.direction === 'acute_down' ? 'acute_down' :
                   me.direction === 'field_relay' ? 'bypass' : me.direction || 'lateral',
        relay_type: me.direction === 'field_relay' ? 'field_relay' : 'direct',
        effect: me.effect || '',
        magnitude: me.magnitude === 'critical' ? 9 : me.magnitude === 'heavy' ? 7 :
                   me.magnitude === 'moderate' ? 5 : 3
      })),
      analysis: data.analysis ? {
        cascade_type: data.analysis.cascade_type,
        starting_dimension: data.analysis.cascade_start,
        failure_mode: data.analysis.primary_failure_mode,
        recovery_type: data.analysis.recovery_type,
        invariants_tested: Object.fromEntries(
          (data.analysis.invariants_tested || []).map(inv => [inv.id, inv.holds])
        ),
        key_finding: data.analysis.key_finding
      } : null
    };
    return out;
  }
  return data;
}

function detectType(data) {
  if (sessions.length === 0) return 'new';
  const cur = sessions[currentIdx];
  if (!cur) return 'new';
  const curName = cur.system_name;
  const newName = data.system_name || data.case_id;
  if (!curName || !newName || curName !== newName) return 'parallel';
  const curLabels = new Set((cur.timeline||[]).map(t=>t.timestep_label));
  const newLabels = (data.timeline||[]).map(t=>t.timestep_label);
  const overlap = newLabels.filter(l=>curLabels.has(l)).length;
  return overlap > 0 ? 'expansion' : 'continuation';
}

function mergeSession(data, type) {
  const s = sessions[currentIdx];
  if (type === 'continuation') {
    (data.timeline||[]).forEach((t,i) => { t._boundary = (i===0); s.timeline.push(t); });
    (data.participants||[]).forEach(p => {
      if (!s.participants.find(x=>x.id===p.id)) s.participants.push(p);
    });
    s.matrix_events = (s.matrix_events||[]).concat(data.matrix_events||[]);
    if (data.analysis) s.analysis = data.analysis;
    currentT = s.timeline.length - 1;
  } else {
    (data.participants||[]).forEach(p => {
      if (!s.participants.find(x=>x.id===p.id)) s.participants.push(p);
    });
    s.matrix_events = (s.matrix_events||[]).concat(data.matrix_events||[]);
  }
}

function clearAll() {
  sessions = []; currentIdx = 0; currentT = 0; focusedPid = null; zoomStack = [];
  localStorage.removeItem('gfe_sessions');
  renderAll();
}

function switchSession(i) {
  currentIdx = i; currentT = 0; focusedPid = null; zoomStack = [];
  renderAll();
}

function removeSession(e, i) {
  e.stopPropagation();
  sessions.splice(i, 1);
  if (currentIdx >= sessions.length) currentIdx = Math.max(0, sessions.length-1);
  saveToStorage();
  renderAll();
}

// Persistence
function saveToStorage() {
  try { localStorage.setItem('gfe_sessions', JSON.stringify(sessions)); } catch(e) {}
}
function loadFromStorage() {
  try {
    const s = localStorage.getItem('gfe_sessions');
    if (s) { sessions = JSON.parse(s); renderAll(); }
  } catch(e) {}
}

// URL loading
window.addEventListener('load', () => {
  try {
    const params = new URLSearchParams(window.location.search);
    const qCase = params.get('case');
    if (qCase && qCase.length > 10) {
      const json = decodeURIComponent(atob(qCase));
      ingestCase(JSON.parse(json));
      return;
    }
    const hash = window.location.hash;
    if (hash && hash.length > 2) {
      const json = decodeURIComponent(atob(hash.slice(1)));
      ingestCase(JSON.parse(json));
      return;
    }
  } catch(e) {}
  loadFromStorage();
});

// ══════════════════════════════════════════════════════════
// RENDER ORCHESTRATION
// ══════════════════════════════════════════════════════════
function renderAll() {
  const hasData = sessions.length > 0;
  const s = sessions[currentIdx];

  // Header status
  const dot = document.getElementById('status-dot');
  const label = document.getElementById('status-label');
  if (hasData && s) {
    dot.classList.add('active');
    label.textContent = (s.system_name || 'Case') + ' · T' + currentT;
  } else {
    dot.classList.remove('active');
    label.textContent = 'No case loaded';
  }

  show('right-empty', !hasData);
  show('right-content', hasData);

  const sections = ['sessions-section','envelope-section','constellation-section','timeline-section','strips-section'];
  sections.forEach(id => show(id, hasData));

  if (!hasData) return;

  renderSessions();
  renderEnvelope(s);
  renderTimeline(s);
  renderStrips(s);
  renderConstellation(s);
  renderRight(s);
}

function show(id, visible) {
  const el = document.getElementById(id);
  if (el) el.style.display = visible === false ? 'none' : (visible === true ? '' : '');
}

// ══════════════════════════════════════════════════════════
// SESSIONS
// ══════════════════════════════════════════════════════════
function renderSessions() {
  const el = document.getElementById('session-list');
  el.innerHTML = sessions.map((s,i) => `
    <div class="session-item ${i===currentIdx?'active':''}" onclick="switchSession(${i})">
      <span class="session-badge badge-${s._type||'new'}">${s._type||'new'}</span>
      <span class="session-name">${esc(s.system_name||s.case_id||'Case')}</span>
      <span class="session-remove" onclick="removeSession(event,${i})">×</span>
    </div>`).join('');
}

// ══════════════════════════════════════════════════════════
// ENVELOPE
// ══════════════════════════════════════════════════════════
function getEnvelope(s) {
  const t = (s.timeline||[])[currentT];
  if (!t) return null;
  const pids = focusedPid ? [focusedPid] : (s.participants||[]).map(p=>p.id);
  let cfgA=0, embA=0, orgA=0, n=0;
  pids.forEach(pid => {
    const d = t.participants?.[pid]?.dimensions||{};
    cfgA += d.Cfg?.A||0; embA += d.Emb?.A||0; orgA += d.Org?.A||0; n++;
  });
  if (!n) return null;
  cfgA=Math.round(cfgA/n); embA=Math.round(embA/n); orgA=Math.round(orgA/n);
  const env = Math.min(cfgA, embA, orgA);
  return { env, adm:cfgA, bear:embA, coh:orgA };
}

function renderEnvelope(s) {
  const ev = getEnvelope(s);
  if (!ev) return;
  const score = document.getElementById('env-score');
  const status = document.getElementById('env-status');
  const comps = document.getElementById('env-components');
  score.textContent = ev.env;
  score.className = 'env-score ' + (ev.env<10?'collapsed':ev.env<30?'critical':ev.env<60?'strained':'ok');
  status.textContent = ev.env<10?'⬛ COLLAPSE':ev.env<30?'⚠ CRITICAL':ev.env<60?'◈ STRAINED':'◉ HOLDING';
  status.style.color = ev.env<30?'var(--dst)':ev.env<60?'var(--mis)':'var(--al)';
  comps.innerHTML = `
    <div class="env-comp"><div class="env-comp-val" style="color:var(--gold)">${ev.adm}</div><span class="env-comp-label">Adm·Cfg</span></div>
    <div class="env-comp"><div class="env-comp-val" style="color:var(--gold)">${ev.bear}</div><span class="env-comp-label">Bear·Emb</span></div>
    <div class="env-comp"><div class="env-comp-val" style="color:var(--teal)">${ev.coh}</div><span class="env-comp-label">Coh·Org</span></div>`;
}

// ══════════════════════════════════════════════════════════
// TIMELINE
// ══════════════════════════════════════════════════════════
function renderTimeline(s) {
  const tl = s.timeline||[];
  const slider = document.getElementById('tl-slider');
  slider.max = Math.max(0, tl.length-1);
  slider.value = currentT;
  slider.oninput = () => { currentT = parseInt(slider.value); renderAll(); };
  const stops = document.getElementById('tl-stops');
  stops.innerHTML = tl.map((t,i) => `
    <div class="tl-stop ${i===currentT?'active':''} ${t._boundary?'boundary':''}" onclick="jumpTo(${i})">
      <div class="tl-dot"></div>
      <div class="tl-label">${esc(t.timestep_label||'T'+i)}</div>
    </div>`).join('');
}

function jumpTo(i) {
  currentT = i;
  document.getElementById('tl-slider').value = i;
  renderAll();
}

// ══════════════════════════════════════════════════════════
// PARTICIPANT STRIPS
// ══════════════════════════════════════════════════════════
function renderStrips(s) {
  const t = (s.timeline||[])[currentT];
  const el = document.getElementById('strips');
  el.innerHTML = (s.participants||[]).map(p => {
    const dims = t?.participants?.[p.id]?.dimensions||{};
    const miniDims = DIMS.map(d => {
      const dim = dims[d]||{A:0,L:0,M:0};
      const pL = dim.A>0?(dim.L/dim.A)*100:0;
      const pM = dim.A>0?(dim.M/dim.A)*100:0;
      return `<div>
        <div class="mini-dim-label">${d}</div>
        <div class="mini-bar">
          <div class="mini-al" style="width:${pL}%"></div>
          <div class="mini-mis" style="width:${pM}%"></div>
        </div>
      </div>`;
    }).join('');
    return `<div class="strip ${focusedPid===p.id?'focused':''}" onclick="focusP('${p.id}')">
      <div class="strip-header">
        <span class="strip-name">${esc(p.name||p.id)}</span>
        <span class="strip-locus">${esc(p.locus||'local')}</span>
      </div>
      <div class="mini-dims">${miniDims}</div>
    </div>`;
  }).join('');
}

function focusP(id) {
  focusedPid = focusedPid===id ? null : id;
  renderAll();
}

// ══════════════════════════════════════════════════════════
// CONSTELLATION
// ══════════════════════════════════════════════════════════
function renderConstellation(s) {
  const canvas = document.getElementById('constellation-canvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.offsetWidth; const H = 200;
  canvas.width = W; canvas.height = H;
  ctx.clearRect(0,0,W,H);
  const t = (s.timeline||[])[currentT];
  if (!t) return;

  let participants = s.participants||[];
  const curZoom = zoomStack[zoomStack.length-1];
  if (curZoom) {
    const parent = findP(s, curZoom);
    if (parent?.sub_participants?.length) participants = parent.sub_participants;
  }

  const cx=W/2, cy=H/2+8, r=Math.min(W,H)*0.3;
  cNodes = participants.map((p,i) => {
    const angle = participants.length===1 ? -Math.PI/2 : (i/participants.length)*2*Math.PI - Math.PI/2;
    const x = participants.length===1 ? cx : cx+r*Math.cos(angle);
    const y = participants.length===1 ? cy : cy+r*Math.sin(angle);
    const dims = t.participants?.[p.id]?.dimensions||{};
    const A = d=>dims[d]?.A||0, L = d=>dims[d]?.L||0, M = d=>dims[d]?.M||0;
    const totalA = DIMS.reduce((s,d)=>s+A(d),0)/5;
    const totalL = DIMS.reduce((s,d)=>s+L(d),0)/5;
    const totalM = DIMS.reduce((s,d)=>s+M(d),0)/5;
    const orgA = A('Org'), cfgA = A('Cfg'), embA = A('Emb');
    const env = Math.min(cfgA,embA,orgA);
    const int_fam = totalL>totalM?'Al':totalM>totalL?'Mis':'neutral';
    const ext = t.participants?.[p.id]?.emission_external;
    const ext_fam = ext?.dominant_family||int_fam;
    const dr = ext_fam!==int_fam?'contradictory':'aligned';
    return { p, x, y, totalA, totalL, totalM, env, int_fam, ext_fam, dr, orgA };
  });

  // Draw inter-participant field lines
  const events = (s.matrix_events||[]).filter(me=>me.timestep_idx===currentT&&me.source_participant&&me.target_participant&&me.source_participant!==me.target_participant);
  events.forEach(me => {
    const from = cNodes.find(n=>n.p.id===me.source_participant);
    const to = cNodes.find(n=>n.p.id===me.target_participant);
    if (!from||!to) return;
    ctx.save();
    ctx.globalAlpha = 0.25;
    ctx.setLineDash(me.relay_type==='field_relay'?[4,4]:me.relay_type==='bypass'?[2,6]:[]);
    ctx.strokeStyle = me.direction==='acute_down'?'#c9a84c':me.direction==='accumulated_up'?'#3a7a7a':'#4a4640';
    ctx.lineWidth = Math.max(1,(me.magnitude||3)*0.35);
    ctx.beginPath(); ctx.moveTo(from.x,from.y); ctx.lineTo(to.x,to.y); ctx.stroke();
    ctx.restore();
  });

  cNodes.forEach(n => {
    const { x, y, totalA, int_fam, ext_fam, dr, env, p } = n;
    const isFocus = focusedPid===p.id;
    const radius = 14 + (totalA/100)*12;

    // Outer emission ring
    const ringCol = ext_fam==='Al'?'#4a8a5a':ext_fam==='Mis'?'#c07040':ext_fam==='Dst'?'#a03030':'#4a4640';
    const ringW = 2 + (n.totalM/100)*5;
    ctx.save();
    ctx.beginPath(); ctx.arc(x,y,radius+5,0,Math.PI*2);
    ctx.strokeStyle = ringCol; ctx.lineWidth = ringW; ctx.globalAlpha = 0.5;
    ctx.stroke(); ctx.restore();

    // Inner fill
    const fillCol = env<20?'#a03030':env<45?'#c07040':int_fam==='Al'?'#4a8a5a':'#4a4640';
    ctx.save();
    ctx.beginPath(); ctx.arc(x,y,radius,0,Math.PI*2);
    ctx.fillStyle = fillCol; ctx.globalAlpha = 0.15; ctx.fill(); ctx.restore();

    // DR contradiction ring
    if (dr==='contradictory') {
      ctx.save();
      ctx.beginPath(); ctx.arc(x,y,radius+11,0,Math.PI*2);
      ctx.strokeStyle='#a03030'; ctx.lineWidth=1; ctx.setLineDash([3,3]); ctx.globalAlpha=0.4;
      ctx.stroke(); ctx.restore();
    }

    // Border
    ctx.save();
    ctx.beginPath(); ctx.arc(x,y,radius,0,Math.PI*2);
    ctx.strokeStyle = isFocus?'#c9a84c':'#4a4640'; ctx.lineWidth = isFocus?2:1.5;
    ctx.globalAlpha = isFocus?1:0.6; ctx.stroke(); ctx.restore();

    // Org relay indicator
    if (n.orgA > 60) {
      ctx.save();
      ctx.beginPath(); ctx.arc(x,y,4,0,Math.PI*2);
      ctx.fillStyle='#3a7a7a'; ctx.globalAlpha=0.5; ctx.fill(); ctx.restore();
    }

    // Label
    ctx.save();
    ctx.font = `${isFocus?'500 ':''}12px "Cormorant Garamond", serif`;
    ctx.fillStyle = '#d4cfc4'; ctx.globalAlpha=0.9;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    const label = p.name?.length>11?p.name.slice(0,10)+'…':(p.name||p.id);
    ctx.fillText(label, x, y); ctx.restore();

    if (p.sub_participants?.length) {
      ctx.save();
      ctx.font='8px "DM Mono", monospace'; ctx.fillStyle='#3a7a7a';
      ctx.textAlign='center'; ctx.globalAlpha=0.7;
      ctx.fillText('⊕'+p.sub_participants.length, x, y+radius+13); ctx.restore();
    }
  });

  renderBreadcrumb(s);
}

document.getElementById('constellation-canvas').addEventListener('click', function(e) {
  const rect = this.getBoundingClientRect();
  const mx = (e.clientX-rect.left)*(this.width/rect.width);
  const my = (e.clientY-rect.top)*(this.height/rect.height);
  let hit = null; let minD = Infinity;
  cNodes.forEach(n => { const d=Math.hypot(mx-n.x,my-n.y); if(d<32&&d<minD){minD=d;hit=n;} });
  if (hit) {
    if (focusedPid===hit.p.id && hit.p.sub_participants?.length) {
      zoomStack.push(hit.p.id); focusedPid=null;
    } else { focusedPid = focusedPid===hit.p.id ? null : hit.p.id; }
  } else { focusedPid=null; }
  renderAll();
});

function renderBreadcrumb(s) {
  const el = document.getElementById('breadcrumb');
  if (!zoomStack.length) { el.innerHTML=''; return; }
  const parts = [`<span class="bc-item" onclick="zoomTo(-1)">System</span>`];
  zoomStack.forEach((pid,i) => {
    const p = findP(s,pid);
    parts.push(`<span class="bc-sep">›</span>`);
    parts.push(`<span class="bc-item" onclick="zoomTo(${i})">${esc(p?.name||pid)}</span>`);
  });
  el.innerHTML = parts.join('');
}

function zoomTo(i) {
  zoomStack = i<0?[]:[...zoomStack.slice(0,i+1)];
  focusedPid=null; renderAll();
}

function findP(s, id) {
  for (const p of s.participants||[]) {
    if (p.id===id) return p;
    if (p.sub_participants) { const f=p.sub_participants.find(x=>x.id===id); if(f) return f; }
  }
  return null;
}

window.addEventListener('resize', () => { const s=sessions[currentIdx]; if(s) renderConstellation(s); });

// ══════════════════════════════════════════════════════════
// RIGHT PANEL
// ══════════════════════════════════════════════════════════
function renderRight(s) {
  const t = (s.timeline||[])[currentT];
  if (!t) return;
  const el = document.getElementById('right-content');
  if (!focusedPid) { renderSystemView(s, t, el); }
  else { const p=findP(s,focusedPid); renderParticipantView(s,t,p,el); }
}

function renderSystemView(s, t, el) {
  let html = `<div class="reading-header">
    <div class="reading-name">${esc(s.system_name||'System')}</div>
    <div class="reading-meta">${esc(t.timestep_label||'')}</div>
  </div>`;
  if (t.narrative_note) html += `<p style="font-size:14px;font-style:italic;color:var(--text2);line-height:1.7;margin-bottom:16px;">${esc(t.narrative_note)}</p>`;
  if (t.emission_notes) html += `<div class="emission-note"><span class="en-label">Emission · E ≠ (A,L,M)</span>${esc(t.emission_notes)}</div>`;
  const events = (s.matrix_events||[]).filter(me=>me.timestep_idx===currentT);
  if (events.length) {
    html += `<div class="sec-label collapsible-header" onclick="toggleC('sys-ev')">Matrix Events <span class="collapsible-arr open" id="arr-sys-ev">▶</span></div>
    <div class="collapsible-body" id="sys-ev"><div style="margin-bottom:16px;">${renderEventsHtml(events)}</div></div>`;
  }
  const isLast = currentT===(s.timeline?.length||1)-1;
  if (s.analysis&&isLast) html += renderAnalysisHtml(s.analysis);
  if (!t.narrative_note&&!events.length&&!s.analysis) {
    html += `<div style="opacity:0.4;margin-top:40px;text-align:center;font-style:italic;color:var(--text2);">Select a participant to read their state.</div>`;
  }
  el.innerHTML = html;
}

function renderParticipantView(s, t, p, el) {
  const dims = t?.participants?.[p?.id]?.dimensions||{};
  const ext = t?.participants?.[p?.id]?.emission_external;
  const taper = t?.participants?.[p?.id]?.taper_note;

  const tabs = `<div class="tabs">
    <div class="tab ${rightTab==='dimensions'?'active':''}" onclick="setTab('dimensions')">Dimensions</div>
    <div class="tab ${rightTab==='events'?'active':''}" onclick="setTab('events')">Events</div>
    <div class="tab ${rightTab==='analysis'?'active':''}" onclick="setTab('analysis')">Analysis</div>
  </div>`;

  let body = '';
  if (rightTab==='dimensions') {
    if (ext) {
      body += `<div style="margin-bottom:6px;"><span class="prov-badge">provisional · dual_register</span></div>
      <div class="dual-reg">
        <div><div class="dr-col-label">Internal Hold</div>
          ${DIMS.map(d=>{const dim=dims[d]||{A:0,L:0,M:0};const pL=dim.A>0?(dim.L/dim.A)*100:0;const pM=dim.A>0?(dim.M/dim.A)*100:0;return`<div class="dr-row"><span class="dr-dim">${d}</span><div class="dr-bar"><div class="mini-al" style="width:${pL}%"></div><div class="mini-mis" style="width:${pM}%"></div></div></div>`;}).join('')}
        </div>
        <div><div class="dr-col-label ext">External Emission</div>
          ${ext.by_dimension?DIMS.map(d=>{const em=ext.by_dimension[d];if(!em)return`<div class="dr-row"><span class="dr-dim">${d}</span><span style="font-size:10px;color:var(--text3);">—</span></div>`;return`<div class="dr-row"><span class="dr-dim">${d}</span><span class="e-family ef-${em.family}">${em.family}</span><span style="font-size:10px;color:var(--text2);flex:1;margin-left:4px;">${esc(em.note||'')}</span></div>`;}).join(''):
          `<div style="font-size:12px;font-style:italic;color:var(--text2);">Dominant: ${ext.dominant_family||'—'}</div>`}
          ${ext.note?`<div class="dr-mismatch">${esc(ext.note)}</div>`:''}
        </div>
      </div>`;
    }
    if (taper) body += `<div class="taper-note"><span style="color:var(--text3);letter-spacing:0.15em;font-size:8px;text-transform:uppercase;">taper · </span>${esc(taper)}</div>`;

    // Dimensions by zone
    ['foundation','bridge','articulation'].forEach(zone => {
      const zm = ZONES[zone];
      const inZone = zm.dims.filter(d=>dims[d]);
      if (!inZone.length) return;
      body += `<div class="zone-block">
        <div class="zone-header">
          <div class="zone-pip" style="background:${zm.pip}"></div>
          <div class="zone-label" style="color:${zm.color}">${zm.label}</div>
          <div class="zone-rule"></div>
        </div>
        ${inZone.map(d=>renderDimCard(d,dims[d],ext)).join('')}
      </div>`;
    });

  } else if (rightTab==='events') {
    const all = (s.matrix_events||[]).filter(me=>me.timestep_idx===currentT);
    const rel = all.filter(me=>me.source_participant===p?.id||me.target_participant===p?.id);
    const show = rel.length>0?rel:all;
    body = show.length ? `<div style="margin-top:4px;">${renderEventsHtml(show)}</div>` :
      `<p style="font-style:italic;color:var(--text3);font-size:13px;margin-top:20px;">No events at this timestep.</p>`;
  } else {
    body = s.analysis ? renderAnalysisHtml(s.analysis) :
      `<p style="font-style:italic;color:var(--text3);font-size:13px;margin-top:20px;">Analysis appears at the final timestep.</p>`;
  }

  // Sub-constellation
  let subHtml = '';
  if (p?.sub_participants?.length) {
    subHtml = `<div class="sub-prompt">
      <span>⊕ ${p.sub_participants.length} sub-participants</span>
      <button class="sub-btn" onclick="zoomToSub('${p.id}')">Zoom in</button>
    </div>`;
  }

  el.innerHTML = `<div class="reading-header">
    <div class="reading-name">${esc(p?.name||focusedPid||'')}</div>
    <div class="reading-meta">${esc(p?.locus||'local')} · ${esc(p?.description||'')}</div>
  </div>${tabs}<div>${body}</div>${subHtml}`;
}

function renderDimCard(d, dim, ext) {
  const A=dim.A||0, L=dim.L||0, M=dim.M||0;
  const neutral = Math.max(0,A-L-M);
  const pL=A>0?(L/A)*100:0, pM=A>0?(M/A)*100:0, pN=A>0?(neutral/A)*100:0, pLost=Math.max(0,100-A);
  const extD = ext?.by_dimension?.[d];
  return `<div class="dim-card">
    <div class="dim-head"><span class="dim-name">${d}</span><span class="dim-gloss">${GLOSSES[d]||''}</span></div>
    <div class="dim-vals">
      <div class="dim-val"><div class="dim-val-num val-A">${A}</div><span class="dim-val-label">A · capacity</span></div>
      <div class="dim-val"><div class="dim-val-num val-L">${L}</div><span class="dim-val-label">L · aligned</span></div>
      <div class="dim-val"><div class="dim-val-num val-M">${M}</div><span class="dim-val-label">M · misaligned</span></div>
      <div class="dim-val"><div class="dim-val-num val-N">${neutral}</div><span class="dim-val-label">neutral</span></div>
    </div>
    <div class="axis-bar">
      <div class="bar-al" style="width:${pL}%"></div>
      <div class="bar-mis" style="width:${pM}%"></div>
      <div class="bar-neutral" style="width:${pN}%"></div>
      <div class="bar-lost" style="width:${pLost}%"></div>
    </div>
    ${extD?`<div class="emission-row">
      <span class="e-label">emission</span>
      <span class="e-family ef-${extD.family}">${extD.family}</span>
      <span class="e-note">${esc(extD.note||'')}</span>
      <span class="prov-badge">provisional</span>
    </div>`:''}
  </div>`;
}

function renderEventsHtml(events) {
  if (!events.length) return '';
  return events.map(me => {
    const dc = me.direction==='acute_down'?'dir-acute':me.direction==='accumulated_up'?'dir-accum':me.relay_type==='bypass'||me.direction==='bypass'?'dir-bypass':'dir-lateral';
    const dl = me.direction==='acute_down'?'↓ acute':me.direction==='accumulated_up'?'↑ accum':me.relay_type==='field_relay'?'⤳ relay':'↔ lateral';
    const src = me.source_participant?`${me.source_participant}.${me.source||'?'}`:(me.source||'?');
    const tgt = me.target_participant?`${me.target_participant}.${me.target||'?'}`:(me.target||'?');
    return `<div class="event-row">
      <span class="ev-flow">${esc(src)} → ${esc(tgt)}</span>
      <span class="ev-dir ${dc}">${dl}</span>
      <span class="ev-desc">${esc(me.effect||me.description||'')}</span>
      ${me.magnitude?`<span class="ev-mag">×${me.magnitude}</span>`:''}
    </div>`;
  }).join('');
}

function renderAnalysisHtml(a) {
  const invHtml = a.invariants_tested ? Object.entries(a.invariants_tested).map(([k,v])=>
    `<span class="inv-chip ${v?'held':'failed'}">${k}</span>`).join('') : '';
  return `<div class="analysis-card">
    <div class="sec-label" style="margin-bottom:10px;">Structural Analysis</div>
    ${a.cascade_type?`<div class="a-row"><span class="a-key">Cascade</span><span class="a-val">${esc(a.cascade_type)}</span></div>`:''}
    ${a.starting_dimension?`<div class="a-row"><span class="a-key">Starts at</span><span class="a-val">${esc(a.starting_dimension)}</span></div>`:''}
    ${a.failure_mode?`<div class="a-row"><span class="a-key">Failure</span><span class="a-val">${esc(a.failure_mode)}</span></div>`:''}
    ${a.recovery_type?`<div class="a-row"><span class="a-key">Recovery</span><span class="a-val">${esc(a.recovery_type)}</span></div>`:''}
    ${invHtml?`<div class="a-row"><span class="a-key">Invariants</span><div class="inv-chips">${invHtml}</div></div>`:''}
    ${a.key_finding?`<div class="key-finding">"${esc(a.key_finding)}"</div>`:''}
  </div>`;
}

function setTab(t) { rightTab=t; const s=sessions[currentIdx]; if(s) renderRight(s); }
function zoomToSub(pid) { zoomStack.push(pid); focusedPid=null; renderAll(); }
function toggleC(id) {
  const b=document.getElementById(id); const a=document.getElementById('arr-'+id);
  if(!b) return;
  b.classList.toggle('closed');
  if(a) a.classList.toggle('open', !b.classList.contains('closed'));
}

// ══════════════════════════════════════════════════════════
// UTILITIES
// ══════════════════════════════════════════════════════════
function esc(s) {
  if(s==null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showMsg(msg, type='info') {
  const el = document.getElementById('msg-bar');
  el.className = 'msg-bar msg-'+type;
  el.textContent = msg;
  el.style.display = 'block';
  if(type==='info') setTimeout(()=>el.style.display='none', 2500);
}

// ── INIT ──
renderAll();
</script>
</body>
</html>
