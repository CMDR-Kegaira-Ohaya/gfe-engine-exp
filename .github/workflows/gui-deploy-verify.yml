name: gui-v3-deploy-verify

on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  pages: read

jobs:
  scope:
    runs-on: ubuntu-latest
    outputs:
      gui_changed: ${{ steps.scope.outputs.gui_changed }}
      runtime_changed: ${{ steps.scope.outputs.runtime_changed }}
      base_ref: ${{ steps.scope.outputs.base_ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: scope
        shell: bash
        run: |
          if git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            BASE_REF=HEAD^
          else
            BASE_REF=HEAD
          fi
          echo "base_ref=$BASE_REF" >> "$GITHUB_OUTPUT"

          git diff --name-only "$BASE_REF" HEAD > changed-files.txt || true

          if grep -Eq '^(index\.html|workbench-v3\.html|privacy\.html|ui-v3/|solver/|catalog/|cases/|tools/js/gui-|\.github/workflows/gui-|\.github/redeploy/|package\.json)' changed-files.txt; then
            echo "gui_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "gui_changed=false" >> "$GITHUB_OUTPUT"
          fi

          if grep -Eq '^(index\.html|workbench-v3\.html|privacy\.html|ui-v3/|solver/|catalog/|cases/|\.github/redeploy/|package\.json)' changed-files.txt; then
            echo "runtime_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "runtime_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload Workbench v3 changed-file scope
        uses: actions/upload-artifact@v4
        with:
          name: gui-v3-changed-file-scope
          path: changed-files.txt

  validate-and-verify:
    needs: scope
    if: ${{ needs.scope.outputs.gui_changed == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Workbench v3 tool dependencies
        run: npm install

      - name: Run authoritative Workbench v3 validation chain
        shell: bash
        run: |
          if [ "${{ needs.scope.outputs.runtime_changed }}" = "true" ]; then
            npm run --silent gui:validate-chain -- --base-ref "${{ needs.scope.outputs.base_ref }}" --head-ref HEAD --copy-scan > gui-validate-chain.json
          else
            npm run --silent gui:validate-chain -- --base-ref "${{ needs.scope.outputs.base_ref }}" --head-ref HEAD > gui-validate-chain.json
          fi

      - name: Upload authoritative Workbench v3 validation report
        uses: actions/upload-artifact@v4
        with:
          name: gui-v3-validate-chain-report
          path: gui-validate-chain.json

      - name: Require authoritative Workbench v3 validation success
        run: jq -e '.ok == true' gui-validate-chain.json > /dev/null

      - name: Summarize authoritative Workbench v3 validation
        run: |
          echo '## Workbench v3 validation chain' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- authoritative command: `npm run gui:validate-chain -- --base-ref <base> --head-ref HEAD [--copy-scan]`' >> "$GITHUB_STEP_SUMMARY"
          echo '- canonical entry: `workbench-v3.html`' >> "$GITHUB_STEP_SUMMARY"
          echo '- canonical runtime: `ui-v3/**`, `solver/**`, `catalog/**`, `cases/**`' >> "$GITHUB_STEP_SUMMARY"
          echo '- report uploaded as `gui-v3-validate-chain-report`' >> "$GITHUB_STEP_SUMMARY"

  deploy-pages:
    needs: [scope, validate-and-verify]
    if: ${{ needs.scope.outputs.runtime_changed == 'true' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: github-pages
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - name: Stage canonical Workbench v3 Pages artifact
        shell: bash
        run: |
          rm -rf _site
          mkdir -p _site
          for path in index.html workbench-v3.html privacy.html ui-v3 solver catalog cases; do
            if [ -e "$path" ]; then
              cp -R "$path" _site/
            fi
          done
          touch _site/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4

      - name: Summarize Workbench v3 Pages deploy
        run: |
          echo '## Workbench v3 Pages deploy' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- deploy source: GitHub Actions artifact from canonical Workbench v3 runtime' >> "$GITHUB_STEP_SUMMARY"
          echo '- staged public paths: `index.html`, `workbench-v3.html`, `privacy.html`, `ui-v3/**`, `solver/**`, `catalog/**`, `cases/**`' >> "$GITHUB_STEP_SUMMARY"
          echo '- deployment URL: `${{ steps.deployment.outputs.page_url }}`' >> "$GITHUB_STEP_SUMMARY"

  deployed-pages-smoke:
    needs: [scope, validate-and-verify, deploy-pages]
    if: ${{ needs.scope.outputs.runtime_changed == 'true' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Workbench v3 tool dependencies
        run: npm install

      - name: Wait for canonical Workbench v3 Pages output and smoke it
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          npm run --silent gui:pages-live-smoke -- --page-path workbench-v3.html --retries 20 --delay-ms 15000 > gui-pages-live-smoke.json

      - name: Upload canonical Workbench v3 Pages smoke report
        uses: actions/upload-artifact@v4
        with:
          name: gui-v3-pages-live-smoke-report
          path: gui-pages-live-smoke.json

      - name: Require canonical Workbench v3 Pages smoke success
        run: jq -e '.ok == true' gui-pages-live-smoke.json > /dev/null

      - name: Summarize canonical Workbench v3 Pages smoke
        run: |
          echo '## Workbench v3 Pages smoke' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- canonical deployed page polled: `workbench-v3.html`' >> "$GITHUB_STEP_SUMMARY"
          echo '- deployment URL: `${{ needs.deploy-pages.outputs.page_url }}`' >> "$GITHUB_STEP_SUMMARY"
          echo '- report uploaded as `gui-v3-pages-live-smoke-report`' >> "$GITHUB_STEP_SUMMARY"

  no-gui-changes:
    needs: scope
    if: ${{ needs.scope.outputs.gui_changed != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Summarize skipped Workbench v3 validation
        run: |
          echo '## Workbench v3 validation skipped' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- no Workbench v3 GUI-scope changes were detected on this push' >> "$GITHUB_STEP_SUMMARY"
