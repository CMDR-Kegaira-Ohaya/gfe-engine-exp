name: gui-deploy-verify

on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  pages: read

jobs:
  scope:
    runs-on: ubuntu-latest
    outputs:
      gui_changed: ${{ steps.scope.outputs.gui_changed }}
      runtime_changed: ${{ steps.scope.outputs.runtime_changed }}
      base_ref: ${{ steps.scope.outputs.base_ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: scope
        shell: bash
        run: |
          if git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            BASE_REF=HEAD^
          else
            BASE_REF=HEAD
          fi
          echo "base_ref=$BASE_REF" >> "$GITHUB_OUTPUT"

          git diff --name-only "$BASE_REF" HEAD > changed-files.txt || true

          if grep -Eq '^(workbench-v3\.html|ui-v3/|tools/js/gui-|\.github/workflows/gui-|package\.json)' changed-files.txt; then
            echo "gui_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "gui_changed=false" >> "$GITHUB_OUTPUT"
          fi

          if grep -Eq '^(workbench-v3\.html|ui-v3/|package\.json)' changed-files.txt; then
            echo "runtime_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "runtime_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload changed-file scope
        uses: actions/upload-artifact@v4
        with:
          name: gui-changed-file-scope
          path: changed-files.txt

  validate-and-verify:
    needs: scope
    if: ${{ needs.scope.outputs.gui_changed == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install repo-local tool dependencies
        run: npm install

      - name: Run GUI validation chain
        shell: bash
        run: |
          if [ "${{ needs.scope.outputs.runtime_changed }}" = "true" ]; then
            npm run gui:validate-chain -- --base-ref "${{ needs.scope.outputs.base_ref }}" --head-ref HEAD --copy-scan > gui-validate-chain.json
          else
            npm run gui:validate-chain -- --base-ref "${{ needs.scope.outputs.base_ref }}" --head-ref HEAD > gui-validate-chain.json
          fi

      - name: Upload GUI validation chain report
        uses: actions/upload-artifact@v4
        with:
          name: gui-validate-chain-report
          path: gui-validate-chain.json

      - name: Require GUI validation chain success
        run: jq -e '.ok == true' gui-validate-chain.json > /dev/null

      - name: Summarize GUI validation chain
        run: |
          echo '## GUI validation chain' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- diff-aware validation ran on this push' >> "$GITHUB_STEP_SUMMARY"
          echo '- report uploaded as `gui-validate-chain-report`' >> "$GITHUB_STEP_SUMMARY"

  deployed-pages-smoke:
    needs: [scope, validate-and-verify]
    if: ${{ needs.scope.outputs.runtime_changed == 'true' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install repo-local tool dependencies
        run: npm install

      - name: Wait for deployed Pages output and smoke it
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          npm run gui:pages-live-smoke -- --page-path workbench-v3.html --retries 20 --delay-ms 15000 > gui-pages-live-smoke.json

      - name: Upload deployed Pages smoke report
        uses: actions/upload-artifact@v4
        with:
          name: gui-pages-live-smoke-report
          path: gui-pages-live-smoke.json

      - name: Require deployed Pages smoke success
        run: jq -e '.ok == true' gui-pages-live-smoke.json > /dev/null

      - name: Summarize deployed Pages smoke
        run: |
          echo '## Deployed Pages smoke' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- deployed workbench page was polled and checked automatically' >> "$GITHUB_STEP_SUMMARY"
          echo '- report uploaded as `gui-pages-live-smoke-report`' >> "$GITHUB_STEP_SUMMARY"

  no-gui-changes:
    needs: scope
    if: ${{ needs.scope.outputs.gui_changed != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Summarize skipped GUI validation
        run: |
          echo '## GUI validation skipped' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- no GUI-scope changes were detected on this push' >> "$GITHUB_STEP_SUMMARY"
