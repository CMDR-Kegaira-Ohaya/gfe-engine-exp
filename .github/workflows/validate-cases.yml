name: validate-cases

on:
  push:
    paths:
      - 'cases/**'
      - 'solver/**'
      - 'tools/cases/**'
      - '.github/workflows/validate-cases.yml'
  pull_request:
    paths:
      - 'cases/**'
      - 'solver/**'
      - 'tools/cases/**'
      - '.github/workflows/validate-cases.yml'
  workflow_dispatch:

jobs:
  validate-case-folders:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validate canonical case folders
        run: node tools/cases/validate-case-folders.mjs

  validate-encodings:
    runs-on: ubuntu-latest
    needs: validate-case-folders
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validate canonical encodings
        run: node tools/cases/validate-encodings.mjs
