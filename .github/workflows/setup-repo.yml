name: Setup Repository

on:
  workflow_dispatch:
    inputs:
      create_drafts:
        description: 'Create drafts branch'
        required: true
        default: 'false'
        type: boolean
      user_lanes:
        description: 'Comma-separated work lane branch names (auto-prefixed with users/ if needed). Examples: alice, bob, users/research'
        required: false
        type: string

permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Ensure canonical repo roots exist on main
        run: |
          mkdir -p cases catalog users
          touch cases/.gitkeep catalog/.gitkeep users/.gitkeep
          git add cases/.gitkeep catalog/.gitkeep users/.gitkeep
          if ! git diff --cached --quiet; then
            git commit -m "Initialize canonical repo roots"
            git push
          fi

      - name: Create drafts branch
        if: ${{ inputs.create_drafts == 'true' }}
        run: |
          if ! git ls-remote --heads origin drafts | grep -q drafts; then
            git checkout -b drafts
            git push origin drafts
            echo "✅ Created 'drafts' branch"
          else
            echo "ℹ羏 'drafts' branch already exists"
          fi
          git checkout main

      - name: Create user work lanes
        if: ${{ inputs.user_lanes != '' }}
        run: |
          IFS=',' read -ra LANES <<< "${{ inputs.user_lanes }}"
          for lane in "${LANES[@]}"; do
            lane=$(echo "$lane" | xargs)
            if [ -z "$lane" ]; then continue; fi
            if [[ "$lane" != users/* ]]; then
              lane="users/$lane"
            fi
            if ! git ls-remote --heads origin "$lane" | grep -q "$lane"; then
              git checkout main
              git checkout -b "$lane"
              mkdir -p users
              touch users/.gitkeep
              git add users/.gitkeep
              git diff --cached --quiet || git commit -m "Initialize $lane"
              git push origin "$lane"
              echo "✅ Created '$lane' branch"
            else
              echo "ℹ羏 '$lane' branch already exists"
            fi
          done
          git checkout main

      - name: Summary
        run: |
          echo "## Repository Setup" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Canonical roots: `/cases/`, `/catalog/`, `/users/`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Remote branches" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          git ls-remote --heads origin | awk '{print "- `" $2 "`"}' | sed 's|refs/heads/||' >> $GITHUB_STEP_SUMMARY
