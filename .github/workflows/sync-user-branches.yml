name: Sync User Case Branches

on:
  push:
    branches: [main]
  workflow_dispatch:
  # optional: nightly safety sync
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-user-branches-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync main into cases/users/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          git fetch --all --prune

          # List branches (4 now; per_page=100 is fine)
          BRANCHES=$(curl -sS -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/$REPO/branches?per_page=100" \
            | python3 - <<'PY'
import json,sys,re
data=json.load(sys.stdin)
for b in data:
  name=b.get("name","")
  if re.match(r"^cases/users/.+", name):
    print(name)
PY
          )

          if [ -z "${BRANCHES:-}" ]; then
            echo "No cases/users/* branches found."
            exit 0
          fi

          open_pr_if_needed () {
            local BR="$1"
            local REPO="$2"

            # If an open PR already exists with head=main into base=$BR, do nothing.
            local EXISTING
            EXISTING=$(curl -sS -H "Authorization: Bearer $GITHUB_TOKEN" \
              "https://api.github.com/repos/$REPO/pulls?state=open&base=$BR&per_page=100" \
              | python3 - <<'PY'
import json,sys
prs=json.load(sys.stdin)
for pr in prs:
  if (pr.get("head") or {}).get("ref") == "main":
    print(pr.get("html_url",""))
    break
PY
            )

            if [ -n "${EXISTING:-}" ]; then
              echo "Existing PR already open: $EXISTING"
              return 0
            fi

            curl -sS -X POST -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Content-Type: application/json" \
              "https://api.github.com/repos/$REPO/pulls" \
              -d "$(python3 - <<PY
import json
print(json.dumps({
  "title": "Sync main into " + "$BR",
  "head": "main",
  "base": "$BR",
  "body": "Auto-generated: main has diverged from this user case branch. Resolve conflicts (if any), then merge to update the branch."
}))
PY
              )" >/dev/null

            echo "Opened PR: main -> $BR"
          }

          echo "$BRANCHES" | while read -r BR; do
            echo ""
            echo "=== Syncing main -> $BR ==="

            git checkout -B "$BR" "origin/$BR"
            OLD_SHA=$(git rev-parse HEAD)

            # Try merge main into branch
            if git merge --no-edit "origin/main"; then
              NEW_SHA=$(git rev-parse HEAD)
              if [ "$NEW_SHA" = "$OLD_SHA" ]; then
                echo "No changes needed for $BR"
                continue
              fi

              # Try push; if push fails (e.g., protection), open PR
              if git push origin "$BR"; then
                echo "Pushed updated $BR"
              else
                echo "Push failed for $BR (possible branch protection) — creating PR instead"
                # Reset branch back to origin state locally (clean)
                git reset --hard "origin/$BR" || true
                open_pr_if_needed "$BR" "$REPO"
              fi
            else
              echo "Merge conflict for $BR — creating PR"
              git merge --abort || true
              open_pr_if_needed "$BR" "$REPO"
            fi
          done
