name: Sync User Case Branches

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"  # optional nightly sync

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
concurrency:
  group: sync-user-branches-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch all remote branches
        run: |
          git fetch origin '+refs/heads/*:refs/remotes/origin/*' --prune

      - name: Sync main into cases/users/*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          MAIN_REF="origin/main"

          # List user branches from the local remote refs (no API calls, YAML-safe)
          BRANCHES="$(git for-each-ref --format='%(refname:strip=3)' refs/remotes/origin/cases/users/* 2>/dev/null || true)"

          if [ -z "${BRANCHES:-}" ]; then
            echo "No cases/users/* branches found."
            exit 0
          fi

          open_pr_if_needed () {
            local BASE_BRANCH="$1"

            # Avoid duplicates: if open PR already exists with head=main base=$BASE_BRANCH, do nothing.
            local EXISTING
            EXISTING="$(gh pr list --state open --base "$BASE_BRANCH" --head "main" --json number --jq '.[0].number' 2>/dev/null || true)"

            if [ -n "${EXISTING:-}" ]; then
              echo "Existing PR already open for main -> $BASE_BRANCH (#$EXISTING)"
              return 0
            fi

            gh pr create \
              --title "Sync main into $BASE_BRANCH" \
              --body "Auto-generated: main has diverged from this user case branch. Resolve conflicts if any, then merge to update the branch." \
              --base "$BASE_BRANCH" \
              --head "main"
          }

          echo "$BRANCHES" | while read -r BR; do
            [ -z "$BR" ] && continue
            echo ""
            echo "=== Syncing $MAIN_REF -> $BR ==="

            git checkout -B "$BR" "origin/$BR"
            OLD_SHA="$(git rev-parse HEAD)"

            if git merge --no-edit "$MAIN_REF"; then
              NEW_SHA="$(git rev-parse HEAD)"

              if [ "$NEW_SHA" = "$OLD_SHA" ]; then
                echo "Already up to date: $BR"
                continue
              fi

              # Try push; if blocked (protection), open PR instead.
              if git push origin "$BR"; then
                echo "Pushed updated $BR"
              else
                echo "Push failed for $BR (possible branch protection) — opening PR instead"
                git reset --hard "origin/$BR" || true
                open_pr_if_needed "$BR"
              fi
            else
              echo "Merge conflict for $BR — opening PR"
              git merge --abort || true
              open_pr_if_needed "$BR"
            fi
          done
