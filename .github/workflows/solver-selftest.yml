name: solver-selftest

on:
  push:
    paths:
      - 'solver/**'
      - '.github/workflows/solver-selftest.yml'
  pull_request:
    paths:
      - 'solver/**'
      - '.github/workflows/solver-selftest.yml'
  workflow_dispatch:

jobs:
  selftest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run solver selftest
        run: node solver/selftest.js
