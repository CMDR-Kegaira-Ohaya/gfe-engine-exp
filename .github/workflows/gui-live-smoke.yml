name: gui-v3-live-smoke

on:
  push:
    paths:
      - 'workbench-v3.html'
      - 'ui-v3/**'
      - 'tools/js/gui-*'
      - 'package.json'
      - '.github/workflows/gui-live-smoke.yml'
  pull_request:
    paths:
      - 'workbench-v3.html'
      - 'ui-v3/**'
      - 'tools/js/gui-*'
      - 'package.json'
      - '.github/workflows/gui-live-smoke.yml'
  workflow_dispatch:

jobs:
  live-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Workbench v3 tool dependencies
        run: npm install

      - name: Run Workbench v3 local smoke harness
        run: npm run --silent gui:live-smoke -- workbench-v3.html > gui-live-smoke.json

      - name: Require successful Workbench v3 smoke result
        run: jq -e '.ok == true' gui-live-smoke.json > /dev/null

      - name: Upload Workbench v3 smoke report
        uses: actions/upload-artifact@v4
        with:
          name: gui-v3-live-smoke-report
          path: gui-live-smoke.json

      - name: Summarize Workbench v3 smoke check
        run: |
          echo '## Workbench v3 local smoke' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- canonical entry loaded: `workbench-v3.html`' >> "$GITHUB_STEP_SUMMARY"
          echo '- canonical runtime exercised: `ui-v3/**`' >> "$GITHUB_STEP_SUMMARY"
          echo '- no local Workbench v3 smoke failure was accepted' >> "$GITHUB_STEP_SUMMARY"
          echo '- report uploaded as `gui-v3-live-smoke-report`' >> "$GITHUB_STEP_SUMMARY"
